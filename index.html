<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏁 Corrida Horizontal | Carros Espelhados 🚛</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f1e 0%, #071513 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', monospace;
            padding: 20px;
        }

        .game-container {
            background: #0b2b26;
            border-radius: 64px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid #ffd966;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 4px #2c2e2b, 0 12px 28px black;
            cursor: pointer;
            background-color: #1e2a2a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 15px 20px 5px 20px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #010e0c;
            padding: 8px 20px;
            border-radius: 60px;
            color: #f7f3e0;
            font-weight: bold;
            font-size: 1.6rem;
            font-family: monospace;
            letter-spacing: 2px;
            box-shadow: inset 0 2px 5px #00ffc380, 0 5px 10px rgba(0,0,0,0.3);
        }

        .score-box span {
            color: #ffdd77;
            font-size: 2rem;
            margin-right: 8px;
        }

        .high-box {
            background: #1c2a24;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffe6b3;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: monospace;
            box-shadow: inset 0 1px 3px #b3ffcf, 0 5px 10px rgba(0,0,0,0.2);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 15px 10px 5px;
        }

        .ctrl-btn {
            background: #2d2a1f;
            border: none;
            font-size: 2rem;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            color: #ffec9f;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 6px 0 #5f4c2b;
            font-family: monospace;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5f4c2b;
        }

        .restart-btn {
            background: #e25822;
            color: white;
            border: none;
            font-size: 1.3rem;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #7a2e0c;
            margin-top: 8px;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a2e0c;
        }

        .status {
            text-align: center;
            font-size: 1rem;
            background: #030f0e80;
            border-radius: 50px;
            padding: 5px 15px;
            color: #b6ffda;
            width: fit-content;
            margin: 8px auto 0;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 700px) {
            .ctrl-btn { font-size: 1.6rem; padding: 8px 20px; }
            .score-box { font-size: 1.2rem; }
            .score-box span { font-size: 1.5rem; }
            .game-container { padding: 15px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="info-panel">
            <div class="score-box">
                <span>🏆</span> <span id="currentScore">0</span>
            </div>
            <div class="high-box">
                🏅 RECORDE <span id="highScoreDisplay">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="upBtn">▲ CIMA</button>
            <button class="ctrl-btn" id="downBtn">▼ BAIXO</button>
        </div>

        <div style="display: flex; justify-content: center; margin: 8px 0 5px;">
            <button class="restart-btn" id="restartButton">🔄 REINICIAR CORRIDA</button>
        </div>
        <div class="status" id="gameStatusText">
            ⬆️⬇️ Movimento vertical | Carros inimigos vêm da direita (espelhados)!
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 500;
        canvas.width = W;
        canvas.height = H;

        // ---------- JOGADOR (lado esquerdo) ----------
        const PLAYER_SIZE = 48;
        let player = {
            x: 60,
            y: H/2 - PLAYER_SIZE/2,
            width: PLAYER_SIZE,
            height: PLAYER_SIZE,
            emoji: '🏎️'
        };

        // ---------- OBSTÁCULOS (movem da direita → esquerda) ----------
        let obstacles = [];
        const OBST_SIZE = 48;
        const obstacleEmojis = ['🚛', '🚚', '🚜', '🚓', '🚒', '🚕', '🏍️', '🚌'];

        // ---------- ESTADO DO JOGO ----------
        let gameActive = true;
        let score = 0;
        let highscore = 0;

        // Carregar recorde
        try {
            const saved = localStorage.getItem('raceEmojiHorizontalHigh');
            if(saved && !isNaN(parseInt(saved))) highscore = parseInt(saved);
        } catch(e) {}
        document.getElementById('highScoreDisplay').innerText = highscore;

        // ---------- MECÂNICA DE TEMPO ----------
        let lastTimestamp = 0;
        let animFrameId = null;

        // Velocidade do jogador (pixels/segundo)
        const PLAYER_SPEED = 460;

        // Controles verticais
        let upPressed = false;
        let downPressed = false;

        // Dificuldade dinâmica (horizontal)
        let currentObstacleSpeed = 180;      // px/seg (velocidade dos carros vindo da direita)
        let spawnInterval = 0.9;              // segundos entre cada carro
        let lastSpawnTime = 0;

        // ---------- ATUALIZAR DIFICULDADE PELO SCORE ----------
        function updateDifficultyByScore() {
            // Velocidade base aumenta com pontuação (max ~520)
            let newSpeed = 180 + Math.floor(score / 90) * 14;
            newSpeed = Math.min(newSpeed, 520);
            if(newSpeed !== currentObstacleSpeed && gameActive) {
                currentObstacleSpeed = newSpeed;
                for(let obs of obstacles) {
                    obs.speedX = -currentObstacleSpeed;  // movimento para esquerda
                }
            } else {
                currentObstacleSpeed = newSpeed;
            }

            // Spawn mais rápido (max 0.28s)
            let newInterval = 0.9 - (Math.min(score, 850) / 1450);
            if(newInterval < 0.28) newInterval = 0.28;
            spawnInterval = newInterval;
        }

        // Adicionar pontos e atualizar recorde
        function addPoints(amount) {
            if(!gameActive) return;
            score += amount;
            document.getElementById('currentScore').innerText = score;
            if(score > highscore) {
                highscore = score;
                document.getElementById('highScoreDisplay').innerText = highscore;
                localStorage.setItem('raceEmojiHorizontalHigh', highscore);
            }
            updateDifficultyByScore();
        }

        // Spawn de um carro que nasce na borda direita e vai para esquerda
        function spawnObstacle() {
            const randY = Math.random() * (H - OBST_SIZE);
            const randomEmoji = obstacleEmojis[Math.floor(Math.random() * obstacleEmojis.length)];
            obstacles.push({
                x: W,
                y: randY,
                width: OBST_SIZE,
                height: OBST_SIZE,
                emoji: randomEmoji,
                speedX: -currentObstacleSpeed    // movimento negativo em X
            });
        }

        // Reset completo
        function resetGame() {
            gameActive = true;
            score = 0;
            obstacles = [];
            document.getElementById('currentScore').innerText = "0";
            player.y = H/2 - PLAYER_SIZE/2;
            currentObstacleSpeed = 180;
            spawnInterval = 0.9;
            lastSpawnTime = performance.now() / 1000;
            updateDifficultyByScore();
            upPressed = false;
            downPressed = false;
            const statusDiv = document.getElementById('gameStatusText');
            statusDiv.innerHTML = "🏁 CORRENDO! Use ↑/↓ ou W/S para desviar 🏁";
            statusDiv.style.color = "#b6ffda";
        }

        // Colisão retangular
        function checkCollision(rect1, rect2) {
            return (rect1.x < rect2.x + rect2.width &&
                    rect1.x + rect1.width > rect2.x &&
                    rect1.y < rect2.y + rect2.height &&
                    rect1.y + rect1.height > rect2.y);
        }

        // Atualização da lógica (movimento, spawn, colisão)
        function updateGame(deltaSec) {
            if(!gameActive) return;

            // 1. Movimento do jogador (vertical)
            let move = 0;
            if(upPressed) move = -1;
            if(downPressed) move = 1;
            let newY = player.y + move * PLAYER_SPEED * deltaSec;
            // limites verticais
            if(newY < 5) newY = 5;
            if(newY + PLAYER_SIZE > H - 5) newY = H - PLAYER_SIZE - 5;
            player.y = newY;

            // 2. Atualizar posição dos obstáculos (movimento para esquerda)
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x += obstacles[i].speedX * deltaSec;
            }

            // 3. Remover obstáculos que saíram pela esquerda (x + width < 0) -> pontuação
            obstacles = obstacles.filter(obs => {
                if(obs.x + obs.width < 0) {
                    addPoints(10);
                    return false;
                }
                return true;
            });

            // 4. Colisão (jogador vs cada carro)
            const playerRect = {
                x: player.x,
                y: player.y,
                width: PLAYER_SIZE,
                height: PLAYER_SIZE
            };
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                const obsRect = {
                    x: obs.x,
                    y: obs.y,
                    width: OBST_SIZE,
                    height: OBST_SIZE
                };
                if(checkCollision(playerRect, obsRect)) {
                    gameActive = false;
                    const statusDiv = document.getElementById('gameStatusText');
                    statusDiv.innerHTML = "💥 GAME OVER! Clique em REINICIAR 💥";
                    statusDiv.style.color = "#ffb347";
                    return;
                }
            }

            // 5. Spawn de novos carros (baseado no tempo real)
            const now = performance.now() / 1000;
            if(lastSpawnTime === 0) lastSpawnTime = now;
            if(now - lastSpawnTime >= spawnInterval) {
                spawnObstacle();
                lastSpawnTime = now;
                // Chance de spawn duplo para dificuldade extra (15% se score > 250)
                if(score > 250 && Math.random() < 0.15 && gameActive) {
                    spawnObstacle();
                }
            }
        }

        // ---------- DESENHO COMPLETO (pista horizontal + emojis espelhados) ----------
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Asfalto escuro
            ctx.fillStyle = "#182623";
            ctx.fillRect(0, 0, W, H);

            // Faixas horizontais (estrada)
            ctx.strokeStyle = "#f5e56b";
            ctx.lineWidth = 4;
            for(let i = 0; i < 5; i++) {
                let laneY = 60 + i * 95;
                ctx.beginPath();
                ctx.setLineDash([25, 40]);
                ctx.moveTo(0, laneY);
                ctx.lineTo(W, laneY);
                ctx.stroke();
            }
            ctx.setLineDash([]);
            
            // Linha central vertical? não, mas bordas laterais
            ctx.beginPath();
            ctx.strokeStyle = "#ffb347";
            ctx.lineWidth = 5;
            ctx.moveTo(40, 0);
            ctx.lineTo(40, H);
            ctx.moveTo(W-40, 0);
            ctx.lineTo(W-40, H);
            ctx.stroke();

            // Canteiro / acostamento
            ctx.fillStyle = "#3f6640";
            ctx.fillRect(0, 0, 20, H);
            ctx.fillRect(W-20, 0, 20, H);
            
            // Marcadores de velocidade (efeito)
            const nowMs = performance.now() / 100;
            for(let i=0; i<12; i++) {
                let offset = (nowMs * 8 + i * 70) % 140;
                ctx.fillStyle = "#f4c542";
                ctx.fillRect(offset - 40, 20 + i*40, 18, 12);
                ctx.fillRect(offset - 60, H - 60 - i*35, 18, 12);
            }

            // Desenhar obstáculos (carros inimigos) com espelhamento horizontal
            for(let obs of obstacles) {
                ctx.save();
                // Sombra antes da transformação
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 8;
                
                // Fundo arredondado (não precisa espelhar)
                ctx.fillStyle = "#aa2e1e80";
                ctx.beginPath();
                ctx.roundRect(obs.x+2, obs.y+2, obs.width-4, obs.height-4, 12);
                ctx.fill();
                
                // Posição central para o emoji
                const centerX = obs.x + obs.width/2;
                const centerY = obs.y + obs.height/2;
                
                // Aplica espelhamento horizontal (scale -1, 1) para que o veículo pareça estar indo para a esquerda
                ctx.translate(centerX, centerY);
                ctx.scale(-1, 1);
                ctx.font = `44px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                ctx.fillText(obs.emoji, 0, 0);
                ctx.restore();
            }

            // Jogador principal (sem espelhamento, porque fica parado na esquerda)
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffd966";
            ctx.font = `48px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const playerCX = player.x + PLAYER_SIZE/2;
            const playerCY = player.y + PLAYER_SIZE/2;
            ctx.fillStyle = "#ffffffba";
            ctx.beginPath();
            ctx.arc(playerCX, playerCY+2, 28, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#ffec99";
            ctx.fillText(player.emoji, playerCX, playerCY-2);
            ctx.fillStyle = "#fff9e8";
            ctx.fillText(player.emoji, playerCX, playerCY);
            ctx.restore();
            
            // Faróis do jogador
            ctx.beginPath();
            ctx.fillStyle = "#ffdd88aa";
            ctx.moveTo(player.x+10, player.y+12);
            ctx.lineTo(player.x-8, player.y+28);
            ctx.lineTo(player.x+8, player.y+28);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = "#ffdd88aa";
            ctx.moveTo(player.x+PLAYER_SIZE-10, player.y+12);
            ctx.lineTo(player.x+PLAYER_SIZE+8, player.y+28);
            ctx.lineTo(player.x+PLAYER_SIZE-8, player.y+28);
            ctx.fill();

            // Informações de velocidade e spawn
            ctx.font = "bold 18px 'Courier New'";
            ctx.fillStyle = "#faf0bf";
            ctx.fillText(`⚡ VEL: ${Math.floor(currentObstacleSpeed/10)}km/h`, W-150, 40);
            ctx.fillText(`🚦 INTERVALO: ${(spawnInterval).toFixed(2)}s`, W-170, 75);

            // Game Over overlay
            if(!gameActive) {
                ctx.globalAlpha = 0.75;
                ctx.fillStyle = "#0f0c1c";
                ctx.fillRect(0, 0, W, H);
                ctx.globalAlpha = 1;
                ctx.font = "38px monospace";
                ctx.fillStyle = "#ffb347";
                ctx.fillText("💥 GAME OVER 💥", W/2, H/2-45);
                ctx.font = "22px monospace";
                ctx.fillStyle = "#ffe6a3";
                ctx.fillText("aperte REINICIAR para nova corrida", W/2, H/2+35);
            }

            // Efeito nitro se score alto
            if(score > 450 && gameActive) {
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = "#ffb347";
                for(let s=0; s<4; s++) {
                    ctx.fillRect(W-70 - s*15, H-20, 12, 12);
                }
                ctx.globalAlpha = 1;
            }
        }

        // RoundRect suporte
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // ---------- LOOP PRINCIPAL COM DELTA TIME ----------
        let lastFrameTime = 0;
        function gameLoop(nowMs) {
            if(!animFrameId) return;
            const nowSec = nowMs / 1000;
            let delta = Math.min(0.033, nowSec - lastFrameTime);
            if(delta <= 0) {
                lastFrameTime = nowSec;
                draw();
                animFrameId = requestAnimationFrame(gameLoop);
                return;
            }
            if(gameActive) {
                updateGame(delta);
            }
            draw();
            lastFrameTime = nowSec;
            animFrameId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            resetGame();
            lastSpawnTime = performance.now() / 1000;
            lastFrameTime = performance.now() / 1000;
            if(animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ---------- CONTROLES (TECLADO E BOTÕES) ----------
        function handleKeyDown(e) {
            const key = e.key;
            if(key === 'ArrowUp' || key === 'w' || key === 'W') {
                upPressed = true;
                e.preventDefault();
            } else if(key === 'ArrowDown' || key === 's' || key === 'S') {
                downPressed = true;
                e.preventDefault();
            }
            if(key === 'r' || key === 'R') {
                e.preventDefault();
                resetGame();
            }
        }

        function handleKeyUp(e) {
            const key = e.key;
            if(key === 'ArrowUp' || key === 'w' || key === 'W') {
                upPressed = false;
                e.preventDefault();
            } else if(key === 'ArrowDown' || key === 's' || key === 'S') {
                downPressed = false;
                e.preventDefault();
            }
        }

        // Botões touch/mouse
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const restartBtn = document.getElementById('restartButton');

        function bindButton(btn, isUp) {
            const startPress = (e) => {
                e.preventDefault();
                if(isUp) upPressed = true;
                else downPressed = true;
            };
            const endPress = (e) => {
                e.preventDefault();
                if(isUp) upPressed = false;
                else downPressed = false;
            };
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
            btn.addEventListener('touchstart', startPress, {passive: false});
            btn.addEventListener('touchend', endPress);
            btn.addEventListener('touchcancel', endPress);
        }

        bindButton(upBtn, true);
        bindButton(downBtn, false);

        restartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetGame();
            gameActive = true;
            lastSpawnTime = performance.now() / 1000;
            updateDifficultyByScore();
            const statusDiv = document.getElementById('gameStatusText');
            statusDiv.innerHTML = "🏁 CORRENDO! Use ↑/↓ ou W/S para desviar 🏁";
            statusDiv.style.color = "#b6ffda";
        });

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        // Prevenir scroll com setas
        window.addEventListener('keydown', function(e) {
            if(e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                if(e.target === document.body || e.target === document.documentElement) {
                    e.preventDefault();
                }
            }
        });

        startGame();
    })();
</script>
</body>
</html>
